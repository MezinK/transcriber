services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: transcriptions
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d transcriptions"]
      interval: 5s
      timeout: 5s
      retries: 5
    shm_size: 256mb
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://app:app@postgres:5432/transcriptions"
      UPLOAD_DIR: /uploads
      MAX_UPLOAD_BYTES: "524288000"  # 500 MB
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - uploads:/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    platform: linux/amd64
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend-worker
    environment:
      DATABASE_URL: "postgresql+asyncpg://app:app@postgres:5432/transcriptions"
      UPLOAD_DIR: /uploads
      TRANSCRIPTION_BACKEND: whisperx
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_BATCH_SIZE: ${WHISPER_BATCH_SIZE:-4}
      WHISPER_DIARIZATION_ENABLED: ${WHISPER_DIARIZATION_ENABLED:-false}
      HF_TOKEN: ${HF_TOKEN:-}
    command: ["python", "-m", "worker.main"]
    volumes:
      - uploads:/uploads
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
    # Scale with: docker compose up --scale worker=N
    # The DB claim logic (FOR UPDATE SKIP LOCKED) supports concurrent workers.

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: backend-api
    environment:
      DATABASE_URL: "postgresql+asyncpg://app:app@postgres:5432/transcriptions"
      UPLOAD_DIR: /uploads
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
