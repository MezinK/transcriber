services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: transcriptions
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d transcriptions"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://app:app@postgres:5432/transcriptions"
      UPLOAD_DIR: /uploads
      MAX_UPLOAD_BYTES: "524288000"  # 500 MB
    volumes:
      - uploads:/uploads
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://app:app@postgres:5432/transcriptions"
      UPLOAD_DIR: /uploads
      TRANSCRIPTION_ENGINE: faster-whisper
      WHISPER_MODEL: base
    volumes:
      - uploads:/uploads
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
